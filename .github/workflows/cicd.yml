name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Default scan settings (mirrors Jenkinsfile parameters) ────────────────────
env:
  MDSSC_API_KEY_HEADER:          apikey
  VULNERABILITY_THRESHOLD:       critical
  FAIL_ON_SECRET:                "true"
  FAIL_ON_MALWARE:               "true"
  MDSSC_SCAN_TIMEOUT:            "900"
  MDSSC_POLL_INTERVAL:           "10"
  MDSSC_MAX_UPLOAD_MB:           "100"
  MDSSC_SKIP_LARGE_ARTIFACTS:    "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Source Code Scan
  # Health check → auto-detect workflow → indirect branch scan
  # Mirrors: Check Health + Fetch Workflow + MDSSC-Source Code Scan stages
  # ─────────────────────────────────────────────────────────────────────────────
  source-scan:
    name: "1 · Source Code Scan"
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: MDSSC Source Code Scan
        id: scan
        env:
          MDSSC_INSTANCE:        ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:         ${{ secrets.MDSSC_API_KEY }}
          MDSSC_API_KEY_HEADER:  ${{ secrets.MDSSC_API_KEY_HEADER || 'apikey' }}
          MDSSC_WORKFLOW_ID:     ${{ secrets.MDSSC_WORKFLOW_ID }}
        run: bash ci/scripts/mdssc-source-scan.sh

      - name: Upload source scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-scan-results
          path: scan-results/source-scan.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Security Scan
  # npm audit on e2e/ (Node.js). Mirrors the Security Scan stage in Jenkinsfile.
  # Runs in parallel with source-scan (no dependency between them).
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "2 · Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — E2E dependencies
        working-directory: e2e
        run: |
          npm install
          echo ""
          echo "=========================================="
          echo "   E2E npm audit REPORT"
          echo "=========================================="
          npm audit --json > ../e2e-audit.json 2>/dev/null || true
          node -e "
            const d = JSON.parse(require('fs').readFileSync('../e2e-audit.json','utf8'));
            const v = d.metadata && d.metadata.vulnerabilities ? d.metadata.vulnerabilities : {};
            console.log('  Critical : ' + (v.critical||0));
            console.log('  High     : ' + (v.high||0));
            console.log('  Moderate : ' + (v.moderate||0));
            console.log('  Low      : ' + (v.low||0));
            console.log('==========================================');
          "

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: e2e-audit.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Build Plugin (.hpi)
  # Waits for both source-scan and security-scan to finish.
  # Uses real plugin if plugin-src/pom.xml exists, otherwise generates stub.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "3 · Build Plugin (.hpi)"
    needs: [source-scan, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin

      - name: Build .hpi
        run: |
          mkdir -p plugin
          if [ -f plugin-src/pom.xml ]; then
            echo "Building real plugin from plugin-src/"
            cd plugin-src && mvn -B package -DskipTests
            cp target/*.hpi ../plugin/mdssc-plugin.hpi
          else
            echo "::notice::Track A plugin not yet available — generating placeholder .hpi"
            mkdir -p _stub/META-INF
            printf 'Manifest-Version: 1.0\nPlugin-Class: io.mdssc.MdsscPlugin\nPlugin-Version: 0.0.1-SNAPSHOT\nPlugin-Id: mdssc-scanner\n' \
              > _stub/META-INF/MANIFEST.MF
            cd _stub && zip -r ../plugin/mdssc-plugin.hpi . -q
            echo "Placeholder .hpi created ($(du -sh ../plugin/mdssc-plugin.hpi | cut -f1))"
          fi

      - name: Upload .hpi artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/mdssc-plugin.hpi

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Artifact Scan
  # Scans all artifacts in plugin/ — size limit MDSSC_MAX_UPLOAD_MB.
  # Mirrors Jenkinsfile's Artifact Scan + printFinalSummary.
  # ─────────────────────────────────────────────────────────────────────────────
  artifact-scan:
    name: "4 · Artifact Scan (.hpi)"
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: MDSSC Artifact Scan
        id: scan
        env:
          MDSSC_INSTANCE:       ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:        ${{ secrets.MDSSC_API_KEY }}
          MDSSC_API_KEY_HEADER: ${{ secrets.MDSSC_API_KEY_HEADER || 'apikey' }}
          ARTIFACT_DIR:         plugin
        run: bash ci/scripts/mdssc-artifact-scan.sh

      - name: Upload artifact scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-scan-results
          path: scan-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5 — E2E Tests (placeholder — Track C tests coming soon)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "5 · E2E Tests"
    needs: [build, artifact-scan]
    runs-on: ubuntu-latest
    steps:
      - name: E2E tests placeholder
        run: echo "E2E test suite — Track C implementation pending"

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6 — Report + GitHub Pages
  # Always runs. Deploys docs/ to Pages on main push.
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: "6 · Report"
    needs: [source-scan, security-scan, build, artifact-scan, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate pipeline report
        env:
          SOURCE_SCAN_STATUS:    ${{ needs.source-scan.result }}
          SECURITY_SCAN_STATUS:  ${{ needs.security-scan.result }}
          BUILD_STATUS:          ${{ needs.build.result }}
          ARTIFACT_SCAN_STATUS:  ${{ needs.artifact-scan.result }}
          E2E_STATUS:            ${{ needs.e2e-tests.result }}
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          REPO:       ${{ github.repository }}
        run: node ci/scripts/generate-report.js

      - name: Copy report into docs site
        run: cp test-results/pipeline-report.json docs/pipeline-report.json

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: test-results/pipeline-report.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy GitHub Pages (main branch push only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: "Deploy GitHub Pages"
    needs: report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
