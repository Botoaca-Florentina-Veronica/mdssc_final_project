name: CI/CD

on:
  push:
  pull_request:

  # ── Rulare manuală cu parametri personalizați ────────────────────────────────
  # Accesează GitHub → Actions → CI/CD → Run workflow → completează câmpurile.
  # Valorile introduse aici suprascriu ci/mdssc-params.env.
  # Lasa gol pentru a folosi valorile implicite din ci/mdssc-params.env.
  workflow_dispatch:
    inputs:
      # ── Conexiune ──────────────────────────────────────────────────────────
      api_key_header:
        description: 'Header HTTP pentru API key (ex: apikey)'
        required: false
        default: ''

      # ── Workflow MDSSC ─────────────────────────────────────────────────────
      workflow_id:
        description: 'MDSSC Workflow ID (gol = auto-detectare)'
        required: false
        default: ''

      # ── Threshold vulnerabilități ──────────────────────────────────────────
      vulnerability_threshold:
        description: 'Severitate minimă care eșuează build-ul'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - none
          - low
          - medium
          - high
          - critical

      # ── Opțiuni fail ───────────────────────────────────────────────────────
      fail_on_secret:
        description: 'Eșuează dacă găsește secrete hardcodate (true/false)'
        required: false
        default: ''
      fail_on_malware:
        description: 'Eșuează dacă găsește malware (true/false)'
        required: false
        default: ''

      # ── Timing ────────────────────────────────────────────────────────────
      scan_timeout:
        description: 'Timeout scan în secunde (implicit: 900)'
        required: false
        default: ''
      poll_interval:
        description: 'Interval poll în secunde (implicit: 10)'
        required: false
        default: ''

      # ── Artifact scan ──────────────────────────────────────────────────────
      max_upload_mb:
        description: 'Dimensiune maximă artefact pentru upload în MB (implicit: 100)'
        required: false
        default: ''
      skip_large_artifacts:
        description: 'Sare artefactele prea mari în loc să dea fail (true/false)'
        required: false
        default: ''

      # ── Source scan ────────────────────────────────────────────────────────
      branch:
        description: 'Branch de scanat (gol = branch-ul curent)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Valori implicite — suprascrise de workflow_dispatch inputs sau ci/mdssc-params.env ──
env:
  MDSSC_API_KEY_HEADER:       ${{ inputs.api_key_header         || 'apikey' }}
  VULNERABILITY_THRESHOLD:    ${{ inputs.vulnerability_threshold || 'critical' }}
  FAIL_ON_SECRET:             ${{ inputs.fail_on_secret          || 'true' }}
  FAIL_ON_MALWARE:            ${{ inputs.fail_on_malware         || 'true' }}
  MDSSC_SCAN_TIMEOUT:         ${{ inputs.scan_timeout            || '900' }}
  MDSSC_POLL_INTERVAL:        ${{ inputs.poll_interval           || '10' }}
  MDSSC_MAX_UPLOAD_MB:        ${{ inputs.max_upload_mb           || '100' }}
  MDSSC_SKIP_LARGE_ARTIFACTS: ${{ inputs.skip_large_artifacts    || 'true' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Source Code Scan
  # Indirect scan: MDSSC se conectează la GitHub și scanează repo-ul direct.
  # Identic cu Stage 5 din Jenkins pipeline (MDSSC-Source Code Scan).
  # ─────────────────────────────────────────────────────────────────────────────
  source-scan:
    name: "1 · Source Code Scan"
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: MDSSC Source Code Scan (indirect — MDSSC pulls from GitHub)
        id: scan
        env:
          # Credențiale — vin din GitHub Secrets (Settings → Secrets → Actions)
          MDSSC_INSTANCE:        ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:         ${{ secrets.MDSSC_API_KEY }}
          # Conexiune MDSSC–GitHub — auto-detectate din workflow dacă nu sunt setate
          MDSSC_WORKFLOW_ID:     ${{ inputs.workflow_id || secrets.MDSSC_WORKFLOW_ID }}
          MDSSC_STORAGE_ID:      ${{ secrets.MDSSC_STORAGE_ID }}
          MDSSC_REPOSITORY_ID:   ${{ secrets.MDSSC_REPOSITORY_ID }}
          # Branch de scanat
          MDSSC_BRANCH:          ${{ inputs.branch || github.ref_name }}
          # Parametri scan — din workflow_dispatch inputs sau env globale
          MDSSC_API_KEY_HEADER:  ${{ env.MDSSC_API_KEY_HEADER }}
          VULNERABILITY_THRESHOLD: ${{ env.VULNERABILITY_THRESHOLD }}
          FAIL_ON_SECRET:        ${{ env.FAIL_ON_SECRET }}
          FAIL_ON_MALWARE:       ${{ env.FAIL_ON_MALWARE }}
          MDSSC_SCAN_TIMEOUT:    ${{ env.MDSSC_SCAN_TIMEOUT }}
          MDSSC_POLL_INTERVAL:   ${{ env.MDSSC_POLL_INTERVAL }}
        run: bash ci/scripts/mdssc-source-scan.sh

      - name: Upload source scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-scan-results
          path: scan-results/source-scan.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Security Scan
  # npm audit pe dependențele e2e/. Rulează în paralel cu source-scan.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "2 · Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — E2E dependencies
        working-directory: e2e
        run: |
          npm install
          echo ""
          echo "=========================================="
          echo "   E2E npm audit REPORT"
          echo "=========================================="
          npm audit --json > ../e2e-audit.json 2>/dev/null || true
          node -e "
            const d = JSON.parse(require('fs').readFileSync('../e2e-audit.json','utf8'));
            const v = d.metadata && d.metadata.vulnerabilities ? d.metadata.vulnerabilities : {};
            console.log('  Critical : ' + (v.critical||0));
            console.log('  High     : ' + (v.high||0));
            console.log('  Moderate : ' + (v.moderate||0));
            console.log('  Low      : ' + (v.low||0));
            console.log('==========================================');
          "

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: e2e-audit.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Build Plugin (.hpi)
  # Așteaptă source-scan + security-scan. Construiește plugin-ul Jenkins.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "3 · Build Plugin (.hpi)"
    needs: [source-scan, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Build .hpi
        run: |
          mkdir -p plugin-out
          if [ -f plugin/pom.xml ]; then
            echo "Building real plugin from plugin/"
            cd plugin && mvn -B package -DskipTests
            cp target/*.hpi ../plugin-out/mdssc-plugin.hpi
          else
            echo "::notice::Plugin source not found — generating placeholder .hpi"
            mkdir -p _stub/META-INF
            printf 'Manifest-Version: 1.0\nPlugin-Class: io.mdssc.MdsscPlugin\nPlugin-Version: 1.0.0-SNAPSHOT\nPlugin-Id: mdssc-scanner\n' \
              > _stub/META-INF/MANIFEST.MF
            cd _stub && zip -r ../plugin-out/mdssc-plugin.hpi . -q
            echo "Placeholder .hpi created"
          fi

      - name: Upload .hpi artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin-out/mdssc-plugin.hpi

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Artifact Scan
  # Scanează .hpi-ul construit cu MDSSC (direct upload).
  # ─────────────────────────────────────────────────────────────────────────────
  artifact-scan:
    name: "4 · Artifact Scan (.hpi)"
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: MDSSC Artifact Scan
        id: scan
        env:
          MDSSC_INSTANCE:             ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:              ${{ secrets.MDSSC_API_KEY }}
          MDSSC_API_KEY_HEADER:       ${{ env.MDSSC_API_KEY_HEADER }}
          MDSSC_WORKFLOW_ID:          ${{ inputs.workflow_id || secrets.MDSSC_WORKFLOW_ID }}
          ARTIFACT_DIR:               plugin
          VULNERABILITY_THRESHOLD:    ${{ env.VULNERABILITY_THRESHOLD }}
          FAIL_ON_SECRET:             ${{ env.FAIL_ON_SECRET }}
          FAIL_ON_MALWARE:            ${{ env.FAIL_ON_MALWARE }}
          MDSSC_SCAN_TIMEOUT:         ${{ env.MDSSC_SCAN_TIMEOUT }}
          MDSSC_POLL_INTERVAL:        ${{ env.MDSSC_POLL_INTERVAL }}
          MDSSC_MAX_UPLOAD_MB:        ${{ env.MDSSC_MAX_UPLOAD_MB }}
          MDSSC_SKIP_LARGE_ARTIFACTS: ${{ env.MDSSC_SKIP_LARGE_ARTIFACTS }}
        run: bash ci/scripts/mdssc-artifact-scan.sh

      - name: Upload artifact scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-scan-results
          path: scan-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5 — E2E Tests
  # Playwright + mock server MDSSC.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "5 · E2E Tests"
    needs: [build, artifact-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2E dependencies
        run: npm install
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        env:
          MDSSC_INSTANCE: ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:  ${{ secrets.MDSSC_API_KEY }}
          HPI_PATH:       ${{ github.workspace }}/plugin/mdssc-plugin.hpi
          CI:             "true"
        run: npx playwright test
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6 — Report + GitHub Pages
  # Mereu rulează. Publică pe Pages la push pe main.
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: "6 · Report"
    needs: [source-scan, security-scan, build, artifact-scan, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate pipeline report
        env:
          SOURCE_SCAN_STATUS:    ${{ needs.source-scan.result }}
          SECURITY_SCAN_STATUS:  ${{ needs.security-scan.result }}
          BUILD_STATUS:          ${{ needs.build.result }}
          ARTIFACT_SCAN_STATUS:  ${{ needs.artifact-scan.result }}
          E2E_STATUS:            ${{ needs.e2e-tests.result }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          REPO:       ${{ github.repository }}
          MDSSC_INSTANCE:      ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_REPOSITORY_ID: ${{ secrets.REPOSITORY_ID }}
        run: node ci/scripts/generate-report.js

      - name: Copy report into docs site
        if: always()
        run: cp test-results/pipeline-report.json docs/pipeline-report.json

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: test-results/pipeline-report.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy GitHub Pages (doar la push pe main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: "Deploy GitHub Pages"
    needs: report
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
