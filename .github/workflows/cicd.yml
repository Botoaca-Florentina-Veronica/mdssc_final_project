name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1 — Source Code Scan
  # ─────────────────────────────────────────────────────────────
  source-scan:
    name: "1 · Source Code Scan"
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: MDSSC Source Code Scan
        id: scan
        env:
          MDSSC_INSTANCE: ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY: ${{ secrets.MDSSC_API_KEY }}
          VULNERABILITY_THRESHOLD: critical
          FAIL_ON_SECRET: "true"
          FAIL_ON_MALWARE: "true"
        run: bash ci/scripts/mdssc-source-scan.sh

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-scan-results
          path: scan-results/source-scan.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Stage 2 — Build Plugin (.hpi)
  # ─────────────────────────────────────────────────────────────
  build:
    name: "2 · Build Plugin (.hpi)"
    needs: source-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
          cache: maven

      - name: Build .hpi
        run: |
          mkdir -p plugin
          if [ -f plugin-src/pom.xml ]; then
            echo "Building real plugin from plugin-src/"
            cd plugin-src && mvn -B package -DskipTests
            cp target/*.hpi ../plugin/mdssc-plugin.hpi
          else
            echo "::notice::Track A plugin not yet available — generating placeholder .hpi"
            mkdir -p _stub/META-INF
            printf 'Manifest-Version: 1.0\nPlugin-Class: io.mdssc.MdsscPlugin\nPlugin-Version: 0.0.1-SNAPSHOT\nPlugin-Id: mdssc-scanner\nPlugin-Dependencies: \n' \
              > _stub/META-INF/MANIFEST.MF
            cd _stub && zip -r ../plugin/mdssc-plugin.hpi . -q
            echo "Placeholder .hpi created ($(du -sh ../plugin/mdssc-plugin.hpi | cut -f1))"
          fi

      - name: Upload .hpi artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/mdssc-plugin.hpi

  # ─────────────────────────────────────────────────────────────
  # Stage 3 — Artifact Scan
  # ─────────────────────────────────────────────────────────────
  artifact-scan:
    name: "3 · Artifact Scan (.hpi)"
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: MDSSC Artifact Scan
        id: scan
        env:
          MDSSC_INSTANCE: ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY: ${{ secrets.MDSSC_API_KEY }}
          ARTIFACT_PATH: plugin/mdssc-plugin.hpi
          VULNERABILITY_THRESHOLD: critical
          FAIL_ON_SECRET: "true"
          FAIL_ON_MALWARE: "true"
        run: bash ci/scripts/mdssc-artifact-scan.sh

      - name: Upload artifact scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-scan-results
          path: scan-results/artifact-scan.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Stage 4 — E2E Tests
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: "4 · E2E Tests"
    needs: [build, artifact-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2E dependencies
        run: npm install
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        env:
          MDSSC_INSTANCE: ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY: ${{ secrets.MDSSC_API_KEY }}
          HPI_PATH: ${{ github.workspace }}/plugin/mdssc-plugin.hpi
          CI: "true"
        run: npx playwright test
        working-directory: e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Stage 5 — Report + GitHub Pages
  # ─────────────────────────────────────────────────────────────
  report:
    name: "5 · Report"
    needs: [source-scan, build, artifact-scan, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate pipeline report
        env:
          SOURCE_SCAN_STATUS: ${{ needs.source-scan.result }}
          BUILD_STATUS: ${{ needs.build.result }}
          ARTIFACT_SCAN_STATUS: ${{ needs.artifact-scan.result }}
          E2E_STATUS: ${{ needs.e2e-tests.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: node ci/scripts/generate-report.js

      - name: Copy report into docs site
        run: |
          cp test-results/pipeline-report.json docs/pipeline-report.json

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload pipeline report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: test-results/pipeline-report.json

  # ─────────────────────────────────────────────────────────────
  # Deploy GitHub Pages (main branch only)
  # ─────────────────────────────────────────────────────────────
  deploy-pages:
    name: "Deploy GitHub Pages"
    needs: report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
