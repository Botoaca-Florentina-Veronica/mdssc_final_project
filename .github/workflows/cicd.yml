name: CI/CD

on:
  push:
  pull_request:

  # ── Scheduled daily scan ─────────────────────────────────────────────────────
  # Runs daily at 06:00 UTC (09:00 Romania in summer / 08:00 in winter — cron is in UTC).
  # Enabled ONLY if the repo variable MDSSC_DAILY_SCAN == 'true'
  # (GitHub → Settings → Secrets and variables → Actions → Variables).
  # On scheduled runs only Source Scan + Artifact Scan are executed.
  schedule:
    - cron: '0 6 * * *'

  # ── Manual run with custom parameters ────────────────────────────────────────
  # Go to GitHub → Actions → CI/CD → Run workflow → fill in the fields.
  # Values entered here override .github/mdssc-params.env.
  # Leave empty to use the default values from .github/mdssc-params.env.
  workflow_dispatch:
    inputs:
      # ── Connection ─────────────────────────────────────────────────────────
      api_key_header:
        description: 'HTTP header for the API key (e.g. apikey)'
        required: false
        default: ''

      # ── MDSSC Workflow ─────────────────────────────────────────────────────
      workflow_id:
        description: 'MDSSC Workflow ID (empty = auto-detect)'
        required: false
        default: ''

      # ── Vulnerability threshold ────────────────────────────────────────────
      vulnerability_threshold:
        description: 'Minimum severity that fails the build'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - none
          - low
          - medium
          - high
          - critical

      # ── Fail options ───────────────────────────────────────────────────────
      fail_on_secret:
        description: 'Fail if hardcoded secrets are found (true/false)'
        required: false
        default: ''
      fail_on_malware:
        description: 'Fail if malware is found (true/false)'
        required: false
        default: ''

      # ── Timing ────────────────────────────────────────────────────────────
      scan_timeout:
        description: 'Scan timeout in seconds (default: 900)'
        required: false
        default: ''
      poll_interval:
        description: 'Poll interval in seconds (default: 10)'
        required: false
        default: ''

      # ── Artifact scan ──────────────────────────────────────────────────────
      max_upload_mb:
        description: 'Maximum artifact size for upload in MB (default: 100)'
        required: false
        default: ''
      skip_large_artifacts:
        description: 'Skip artifacts that are too large instead of failing (true/false)'
        required: false
        default: ''

      # ── Source scan ────────────────────────────────────────────────────────
      branch:
        description: 'Branch to scan (empty = current branch)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # required for the jobs API (per-stage durations in the report)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Default values — overridden by workflow_dispatch inputs or .github/mdssc-params.env ──
env:
  MDSSC_API_KEY_HEADER:       ${{ inputs.api_key_header         || 'apikey' }}
  VULNERABILITY_THRESHOLD:    ${{ inputs.vulnerability_threshold || 'critical' }}
  FAIL_ON_SECRET:             ${{ inputs.fail_on_secret          || 'true' }}
  FAIL_ON_MALWARE:            ${{ inputs.fail_on_malware         || 'true' }}
  MDSSC_SCAN_TIMEOUT:         ${{ inputs.scan_timeout            || '900' }}
  MDSSC_POLL_INTERVAL:        ${{ inputs.poll_interval           || '10' }}
  MDSSC_MAX_UPLOAD_MB:        ${{ inputs.max_upload_mb           || '100' }}
  MDSSC_SKIP_LARGE_ARTIFACTS: ${{ inputs.skip_large_artifacts    || 'true' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Source Code Scan
  # Indirect scan: MDSSC connects to GitHub and scans the repo directly.
  # Identical to Stage 5 of the Jenkins pipeline (MDSSC-Source Code Scan).
  # ─────────────────────────────────────────────────────────────────────────────
  source-scan:
    name: "1 · Source Code Scan"
    # Scheduled scan: only if MDSSC_DAILY_SCAN == 'true'. Push/PR: always.
    if: ${{ github.event_name != 'schedule' || vars.MDSSC_DAILY_SCAN == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: MDSSC Source Code Scan (indirect — MDSSC pulls from GitHub)
        id: scan
        env:
          # Credentials — come from GitHub Secrets (Settings → Secrets → Actions)
          MDSSC_INSTANCE:        ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:         ${{ secrets.MDSSC_API_KEY }}
          # MDSSC–GitHub connection — auto-detected from the workflow if not set
          MDSSC_WORKFLOW_ID:     ${{ inputs.workflow_id || secrets.MDSSC_WORKFLOW_ID }}
          MDSSC_STORAGE_ID:      ${{ secrets.MDSSC_STORAGE_ID }}
          MDSSC_REPOSITORY_ID:   ${{ secrets.MDSSC_REPOSITORY_ID }}
          # Branch to scan
          MDSSC_BRANCH:          ${{ inputs.branch || github.ref_name }}
          # Scan parameters — from workflow_dispatch inputs or global env
          MDSSC_API_KEY_HEADER:  ${{ env.MDSSC_API_KEY_HEADER }}
          VULNERABILITY_THRESHOLD: ${{ env.VULNERABILITY_THRESHOLD }}
          FAIL_ON_SECRET:        ${{ env.FAIL_ON_SECRET }}
          FAIL_ON_MALWARE:       ${{ env.FAIL_ON_MALWARE }}
          MDSSC_SCAN_TIMEOUT:    ${{ env.MDSSC_SCAN_TIMEOUT }}
          MDSSC_POLL_INTERVAL:   ${{ env.MDSSC_POLL_INTERVAL }}
        run: bash ci/scripts/mdssc-source-scan.sh

      - name: Upload source scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-scan-results
          path: scan-results/source-scan.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — Security Scan
  # npm audit on the e2e/ dependencies. Runs in parallel with source-scan.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "2 · Security Scan"
    if: ${{ github.event_name != 'schedule' || vars.MDSSC_DAILY_SCAN == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — E2E dependencies
        working-directory: e2e
        run: |
          npm install
          echo ""
          echo "=========================================="
          echo "   E2E npm audit REPORT"
          echo "=========================================="
          npm audit --json > ../e2e-audit.json 2>/dev/null || true
          node -e "
            const d = JSON.parse(require('fs').readFileSync('../e2e-audit.json','utf8'));
            const v = d.metadata && d.metadata.vulnerabilities ? d.metadata.vulnerabilities : {};
            console.log('  Critical : ' + (v.critical||0));
            console.log('  High     : ' + (v.high||0));
            console.log('  Moderate : ' + (v.moderate||0));
            console.log('  Low      : ' + (v.low||0));
            console.log('==========================================');
          "

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: e2e-audit.json
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Build Plugin (.hpi)
  # Waits for source-scan + security-scan. Builds the Jenkins plugin.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "3 · Build Plugin (.hpi)"
    needs: [source-scan, security-scan]
    if: ${{ github.event_name != 'schedule' || vars.MDSSC_DAILY_SCAN == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Build .hpi
        run: |
          mkdir -p plugin-out
          if [ -f plugin/pom.xml ]; then
            echo "Building real plugin from plugin/"
            cd plugin && mvn -B package -DskipTests
            cp target/*.hpi ../plugin-out/mdssc-plugin.hpi
          else
            echo "::notice::Plugin source not found — generating placeholder .hpi"
            mkdir -p _stub/META-INF
            printf 'Manifest-Version: 1.0\nPlugin-Class: io.mdssc.MdsscPlugin\nPlugin-Version: 1.0.0-SNAPSHOT\nPlugin-Id: mdssc-scanner\n' \
              > _stub/META-INF/MANIFEST.MF
            cd _stub && zip -r ../plugin-out/mdssc-plugin.hpi . -q
            echo "Placeholder .hpi created"
          fi

      - name: Upload .hpi artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin-out/mdssc-plugin.hpi

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Artifact Scan
  # Scans the built .hpi with MDSSC (direct upload).
  # ─────────────────────────────────────────────────────────────────────────────
  artifact-scan:
    name: "4 · Artifact Scan (.hpi)"
    needs: build
    if: ${{ github.event_name != 'schedule' || vars.MDSSC_DAILY_SCAN == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.scan.outputs.passed }}
      scan-id: ${{ steps.scan.outputs.scan-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: MDSSC Artifact Scan
        id: scan
        env:
          MDSSC_INSTANCE:             ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:              ${{ secrets.MDSSC_API_KEY }}
          MDSSC_API_KEY_HEADER:       ${{ env.MDSSC_API_KEY_HEADER }}
          MDSSC_WORKFLOW_ID:          ${{ inputs.workflow_id || secrets.MDSSC_WORKFLOW_ID }}
          ARTIFACT_DIR:               plugin
          VULNERABILITY_THRESHOLD:    ${{ env.VULNERABILITY_THRESHOLD }}
          FAIL_ON_SECRET:             ${{ env.FAIL_ON_SECRET }}
          FAIL_ON_MALWARE:            ${{ env.FAIL_ON_MALWARE }}
          MDSSC_SCAN_TIMEOUT:         ${{ env.MDSSC_SCAN_TIMEOUT }}
          MDSSC_POLL_INTERVAL:        ${{ env.MDSSC_POLL_INTERVAL }}
          MDSSC_MAX_UPLOAD_MB:        ${{ env.MDSSC_MAX_UPLOAD_MB }}
          MDSSC_SKIP_LARGE_ARTIFACTS: ${{ env.MDSSC_SKIP_LARGE_ARTIFACTS }}
        run: bash ci/scripts/mdssc-artifact-scan.sh

      - name: Upload artifact scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-scan-results
          path: scan-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5 — Plugin Integration Test (Jenkins Docker)
  # Starts a real Jenkins instance in Docker, installs the built .hpi,
  # runs Jenkinsfile.test with a real scan against MDSSC.
  # Runs in parallel with E2E Tests (both after artifact-scan).
  # ─────────────────────────────────────────────────────────────────────────────
  plugin-test:
    name: "5 · Plugin Integration Test (Jenkins)"
    needs: artifact-scan
    # Does not run on the scheduled daily scan (only push/PR/manual).
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin-out/

      - name: Run Jenkins plugin integration test
        id: test
        env:
          MDSSC_INSTANCE:     ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:      ${{ secrets.MDSSC_API_KEY }}
          MDSSC_WORKFLOW_ID:  ${{ secrets.MDSSC_WORKFLOW_ID }}
          HPI_FILE:           ${{ github.workspace }}/plugin-out/mdssc-plugin.hpi
        run: |
          bash ci/jenkins/start-jenkins.sh
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Set passed=false on failure
        if: failure()
        run: echo "passed=false" >> $GITHUB_OUTPUT

      - name: Upload Jenkins test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-test-logs
          path: jenkins-test-logs/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6 — E2E Tests
  # Playwright + MDSSC mock server.
  # Runs in parallel with the Plugin Integration Test.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "6 · E2E Tests"
    needs: [build, artifact-scan]
    # Does not run on the scheduled daily scan (only push/PR/manual).
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2E dependencies
        run: npm install
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        # E2E not implemented yet — do not fail the pipeline if missing/failing
        continue-on-error: true
        env:
          MDSSC_INSTANCE: ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_API_KEY:  ${{ secrets.MDSSC_API_KEY }}
          HPI_PATH:       ${{ github.workspace }}/plugin/mdssc-plugin.hpi
          CI:             "true"
        run: npx playwright test
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7 — Report + GitHub Pages
  # Always runs. Publishes to Pages on push to main.
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: "7 · Report"
    needs: [source-scan, security-scan, build, artifact-scan, plugin-test, e2e-tests, release]
    runs-on: ubuntu-latest
    # Does not run on the scheduled daily scan (only push/PR/manual).
    if: ${{ always() && github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate pipeline report
        env:
          SOURCE_SCAN_STATUS:    ${{ needs.source-scan.result }}
          SECURITY_SCAN_STATUS:  ${{ needs.security-scan.result }}
          BUILD_STATUS:          ${{ needs.build.result }}
          ARTIFACT_SCAN_STATUS:  ${{ needs.artifact-scan.result }}
          PLUGIN_TEST_STATUS:    ${{ needs.plugin-test.result }}
          E2E_STATUS:            ${{ needs.e2e-tests.result }}
          RELEASE_STATUS:        ${{ needs.release.result }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID:     ${{ github.run_id }}
          GITHUB_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          REPO:       ${{ github.repository }}
          MDSSC_INSTANCE:      ${{ secrets.MDSSC_INSTANCE }}
          MDSSC_REPOSITORY_ID: ${{ secrets.REPOSITORY_ID }}
        run: node ci/scripts/generate-report.js

      - name: Copy report into docs site
        if: always()
        run: cp test-results/pipeline-report.json docs/pipeline-report.json

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: test-results/pipeline-report.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy GitHub Pages (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: "Deploy GitHub Pages"
    needs: report
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────────────────────
  # Release Plugin (.hpi) on GitHub — optional
  # Enabled ONLY if the repo variable MDSSC_RELEASE == 'true', on push to main.
  # Tag: vYYYY.MM.DD-<run_number> (always unique).
  # needs: artifact-scan ⇒ release ONLY after the artifact scan has passed
  # (artifact-scan depends on build, which depends on source-scan).
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: "Release Plugin (.hpi)"
    needs: artifact-scan
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.MDSSC_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .hpi
        uses: actions/download-artifact@v4
        with:
          name: mdssc-plugin-hpi
          path: plugin-out/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}"
          echo "Creating release $TAG with the .hpi artifact"
          gh release create "$TAG" plugin-out/mdssc-plugin.hpi \
            --title "MDSSC Plugin $TAG" \
            --notes "Automatic release from main @ ${GITHUB_SHA:0:7} (run #${GITHUB_RUN_NUMBER})"
