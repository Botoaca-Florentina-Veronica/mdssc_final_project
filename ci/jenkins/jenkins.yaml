# JCasC — Jenkins Configuration as Code
# Applied automatically at startup via the CASC_JENKINS_CONFIG env var.
# ${MDSSC_INSTANCE} and ${MDSSC_API_KEY} come from the container environment variables.

jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin123"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  globalNodeProperties:
    - envVars:
        env:
          - key: "MDSSC_INSTANCE_URL"
            value: "${MDSSC_INSTANCE}"
          - key: "MDSSC_WORKFLOW_ID"
            value: "${MDSSC_WORKFLOW_ID}"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "mdssc-api-key"
              secret: "${MDSSC_API_KEY}"
              description: "MDSSC API Key (Secret Text)"
